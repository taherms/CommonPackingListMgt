<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packing List App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex flex-col">

<div id="app" class="flex-grow p-4 max-w-5xl mx-auto w-full"></div>

<!-- FOOTER -->
<footer class="bg-white border-t mt-6">
  <div class="max-w-5xl mx-auto px-4 py-3 text-center text-sm text-gray-600">
    🚀 Packing List App • Built by <strong>Taher Shabbiri</strong>  
    <br/>
    GitHub: <a href="https://github.com/taherms" target="_blank" class="text-blue-500 underline">taherms</a>
  </div>
</footer>

<script type="module">
// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5PdxuusJM-Pq-rAHRMFuXywsYwkO8qWY",
  authDomain: "shabbiripacking.firebaseapp.com",
  projectId: "shabbiripacking",
  storageBucket: "shabbiripacking.firebasestorage.app",
  messagingSenderId: "793869127526",
  appId: "1:793869127526:web:c9cbc491644f4dd89902a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const appDiv = document.getElementById("app");

const categories = ["Clothes","Electronics","Documents","Kitchen","Medicines","Misc"];
const statuses = ["To Buy","Purchased","Packed","Not Needed"];

let items = [];
let user = null;

// ================= LOGIN =================
function renderLogin() {
  appDiv.innerHTML = `
    <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-2xl font-bold text-center mb-6">🔐 Welcome</h2>
      <input id="email" placeholder="Email" class="border p-3 w-full mb-3 rounded-lg"/>
      <input id="password" type="password" placeholder="Password" class="border p-3 w-full mb-4 rounded-lg"/>
      <button id="loginBtn" class="bg-blue-500 hover:bg-blue-600 text-white py-2 w-full rounded-lg mb-2">Login</button>
      <button id="signupBtn" class="bg-green-500 hover:bg-green-600 text-white py-2 w-full rounded-lg">Sign Up</button>
    </div>
  `;

  document.getElementById("loginBtn").onclick = async () => {
    try {
      await signInWithEmailAndPassword(auth, email.value, password.value);
    } catch (e) {
      alert(e.message);
    }
  };

  document.getElementById("signupBtn").onclick = async () => {
    try {
      await createUserWithEmailAndPassword(auth, email.value, password.value);
    } catch (e) {
      alert(e.message);
    }
  };
}

// ================= MAIN APP =================
function renderApp() {
  appDiv.innerHTML = `
    <div class="bg-white rounded-2xl shadow p-4 mb-4 flex justify-between items-center">
      <h1 class="text-xl md:text-2xl font-bold">📦 Packing List</h1>
      <button id="logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded-lg">Logout</button>
    </div>

    <div class="grid md:grid-cols-2 gap-3 mb-4">
      <input id="search" placeholder="🔍 Search items..." class="border p-3 rounded-lg"/>
      <select id="filter" class="border p-3 rounded-lg">
        <option value="">All Categories</option>
        ${categories.map(c => `<option>${c}</option>`).join("")}
      </select>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow mb-4">
      <h2 class="font-semibold mb-2">➕ Add Item</h2>
      <input id="name" placeholder="Item name" class="border p-3 mb-2 w-full rounded-lg"/>
      <div class="grid md:grid-cols-2 gap-2">
        <select id="category" class="border p-3 rounded-lg">
          ${categories.map(c => `<option>${c}</option>`).join("")}
        </select>
        <select id="status" class="border p-3 rounded-lg">
          ${statuses.map(s => `<option>${s}</option>`).join("")}
        </select>
      </div>
      <button id="addBtn" class="mt-3 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 w-full rounded-lg">Add Item</button>
    </div>

    <div id="list" class="grid gap-3"></div>
  `;

  document.getElementById("logout").onclick = () => signOut(auth);

  document.getElementById("addBtn").onclick = async () => {
    const nameInput = document.getElementById("name");
    const itemName = nameInput.value.trim();

    if (!itemName) return alert("Enter item name");

    await addDoc(collection(db, "items"), {
      name: itemName,
      category: category.value,
      status: status.value,
      createdBy: user.email
    });

    nameInput.value = "";
  };

  document.getElementById("search").oninput = renderList;
  document.getElementById("filter").onchange = renderList;

  renderList();
}

// ================= STATUS COLOR =================
function getStatusColor(status) {
  return {
    "To Buy": "bg-red-100 text-red-600",
    "Purchased": "bg-yellow-100 text-yellow-600",
    "Packed": "bg-green-100 text-green-600",
    "Not Needed": "bg-gray-200 text-gray-600"
  }[status];
}

// ================= LIST =================
function renderList() {
  const list = document.getElementById("list");
  if (!list) return;

  const searchVal = document.getElementById("search")?.value.toLowerCase() || "";
  const filterVal = document.getElementById("filter")?.value || "";

  const filtered = items.filter(i =>
    i.name.toLowerCase().includes(searchVal) &&
    (!filterVal || i.category === filterVal)
  );

  list.innerHTML = filtered.map(i => `
    <div class="bg-white p-4 rounded-xl shadow flex flex-col md:flex-row md:justify-between md:items-center gap-2">
      <div>
        <div class="font-semibold text-lg">${i.name}</div>
        <div class="text-sm text-gray-500">${i.category}</div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <span class="px-2 py-1 text-xs rounded ${getStatusColor(i.status)}">${i.status}</span>

        <select onchange="updateStatus('${i.id}', this.value)" class="border p-1 rounded">
          ${statuses.map(s => `<option ${s===i.status?'selected':''}>${s}</option>`).join("")}
        </select>

        <button onclick="deleteItem('${i.id}')" class="text-red-500 font-bold">✕</button>
      </div>
    </div>
  `).join("");
}

// ================= ACTIONS =================
window.deleteItem = async (id) => {
  await deleteDoc(doc(db, "items", id));
};

window.updateStatus = async (id, status) => {
  await updateDoc(doc(db, "items", id), { status });
};

// ================= REALTIME =================
onSnapshot(collection(db, "items"), (snapshot) => {
  items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  renderList();
});

// ================= AUTH =================
onAuthStateChanged(auth, (u) => {
  user = u;
  if (u) renderApp();
  else renderLogin();
});
</script>

</body>
</html>
