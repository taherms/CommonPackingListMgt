<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packing List App</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GitHub commit version -->
  <script>
    fetch("https://api.github.com/repos/taherms/CommonPackingListMgt/commits/main")
      .then(res => res.json())
      .then(data => {
        const hash = data.sha.substring(0, 7);
        document.getElementById("version").innerText = "commit " + hash;
      })
      .catch(() => {
        document.getElementById("version").innerText = "offline";
      });
  </script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex flex-col">

<div id="app" class="flex-grow p-3 max-w-5xl mx-auto w-full"></div>

<!-- FOOTER -->
<footer class="bg-white border-t mt-6">
  <div class="max-w-5xl mx-auto px-4 py-3 text-center text-sm text-gray-600">
    🚀 Packing List App | Built by <strong>Taher Shabbiri</strong> |
    GitHub: <a href="https://github.com/taherms" class="text-blue-500 underline" target="_blank">taherms</a> |
    Version: <span id="version"></span>
  </div>
</footer>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ================= CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyB5PdxuusJM-Pq-rAHRMFuXywsYwkO8qWY",
  authDomain: "shabbiripacking.firebaseapp.com",
  projectId: "shabbiripacking",
  storageBucket: "shabbiripacking.firebasestorage.app",
  messagingSenderId: "793869127526",
  appId: "1:793869127526:web:c9cbc491644f4dd89902a7"
};

// ================= INIT =================
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const appDiv = document.getElementById("app");

// dynamic config (FROM FIREBASE)
let categories = [];
let statuses = [];

let items = [];
let user = null;

// ================= LOAD CONFIG =================
async function loadConfig() {

  const catRef = collection(db, "config_categories");
  const statusRef = collection(db, "config_statuses");

  const catSnap = await getDocs(catRef);
  const statusSnap = await getDocs(statusRef);

  // seed defaults if empty
  if (catSnap.empty) {
    const defaults = ["Clothes","Electronics","Documents","Kitchen","Medicines","Misc"];
    for (const c of defaults) {
      await addDoc(catRef, { name: c });
    }
  }

  if (statusSnap.empty) {
    const defaults = ["To Buy","Purchased","Packed","Not Needed"];
    for (const s of defaults) {
      await addDoc(statusRef, { name: s });
    }
  }

  // re-fetch
  const catSnap2 = await getDocs(catRef);
  const statusSnap2 = await getDocs(statusRef);

  categories = catSnap2.docs.map(d => d.data().name);
  statuses = statusSnap2.docs.map(d => d.data().name);
}

// ================= LOGIN =================
function renderLogin() {
  appDiv.innerHTML = `
    <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-2xl font-bold text-center mb-6">🔐 Packing List</h2>

      <input id="email" placeholder="Email"
        class="border p-3 w-full mb-3 rounded-lg"/>

      <input id="password" type="password" placeholder="Password"
        class="border p-3 w-full mb-4 rounded-lg"/>

      <button id="loginBtn"
        class="bg-blue-500 text-white py-2 w-full rounded-lg">
        Login
      </button>
    </div>
  `;

  document.getElementById("loginBtn").onclick = async () => {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  };
}

// ================= MAIN APP =================
function renderApp() {
  appDiv.innerHTML = `
    <div class="bg-white rounded-2xl shadow p-4 mb-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">📦 Packing List</h1>
      <button id="logout" class="bg-red-500 text-white px-4 py-1 rounded-lg">
        Logout
      </button>
    </div>

    <!-- ADD ITEM -->
    <div class="bg-white p-4 rounded-2xl shadow mb-4">
      <input id="name" placeholder="Item name"
        class="border p-3 mb-2 w-full rounded-lg"/>

      <div class="grid md:grid-cols-2 gap-2">
        <select id="category" class="border p-3 rounded-lg">
          ${categories.map(c => `<option>${c}</option>`).join("")}
        </select>

        <select id="status" class="border p-3 rounded-lg">
          ${statuses.map(s => `<option>${s}</option>`).join("")}
        </select>
      </div>

      <button id="addBtn"
        class="mt-3 bg-blue-500 text-white px-4 py-2 w-full rounded-lg">
        Add Item
      </button>
    </div>

    <!-- SEARCH -->
    <div class="grid md:grid-cols-2 gap-3 mb-4">
      <input id="search" placeholder="🔍 Search items..."
        class="border p-3 rounded-lg"/>

      <select id="filter" class="border p-3 rounded-lg">
        <option value="">All Categories</option>
        ${categories.map(c => `<option>${c}</option>`).join("")}
      </select>
    </div>

    <!-- LIST -->
    <div id="list" class="grid gap-3"></div>
  `;

  document.getElementById("logout").onclick = () => signOut(auth);

  document.getElementById("addBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const category = document.getElementById("category").value;
    const status = document.getElementById("status").value;

    if (!name) return alert("Enter item name");

    await addDoc(collection(db, "items"), {
      name,
      category,
      status,
      createdBy: user.email,
      createdAt: new Date()
    });

    document.getElementById("name").value = "";
  };

  document.getElementById("search").oninput = renderList;
  document.getElementById("filter").onchange = renderList;

  renderList();
}

// ================= MOBILE LIST =================
function renderList() {
  const listEl = document.getElementById("list");
  if (!listEl) return;

  const searchVal = (document.getElementById("search")?.value || "").toLowerCase();
  const filterVal = document.getElementById("filter")?.value || "";

  const filtered = items.filter(i =>
    (i.name || "").toLowerCase().includes(searchVal) &&
    (!filterVal || i.category === filterVal)
  );

  listEl.innerHTML = filtered.length
    ? filtered.map(i => `
      <div class="bg-white rounded-xl shadow p-3 flex flex-col gap-2">

        <div class="flex justify-between">
          <div>
            <div class="font-semibold">${i.name}</div>
            <div class="text-xs text-gray-500">${i.category}</div>
          </div>

          <span class="text-xs px-2 py-1 rounded-full
            ${i.status === 'Packed' ? 'bg-green-100 text-green-700' : ''}
            ${i.status === 'Purchased' ? 'bg-yellow-100 text-yellow-700' : ''}
            ${i.status === 'To Buy' ? 'bg-red-100 text-red-700' : ''}
            ${i.status === 'Not Needed' ? 'bg-gray-200 text-gray-600' : ''}
          ">
            ${i.status}
          </span>
        </div>

        <div class="flex gap-2">
          <select onchange="updateStatus('${i.id}', this.value)"
            class="flex-1 border p-2 rounded-lg text-sm">
            ${statuses.map(s => `<option ${s===i.status?'selected':''}>${s}</option>`).join("")}
          </select>

          <button onclick="deleteItem('${i.id}')"
            class="bg-red-50 text-red-500 px-3 py-2 rounded-lg font-bold">
            ✕
          </button>
        </div>
      </div>
    `).join("")
    : `<div class="text-center text-gray-400 mt-10">No items found 📦</div>`;
}

// ================= ACTIONS =================
window.deleteItem = async (id) => {
  await deleteDoc(doc(db, "items", id));
};

window.updateStatus = async (id, status) => {
  await updateDoc(doc(db, "items", id), { status });
};

// ================= REALTIME =================
onSnapshot(collection(db, "items"), (snapshot) => {
  items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  setTimeout(renderList, 50);
});

// ================= AUTH =================
onAuthStateChanged(auth, async (u) => {
  user = u;

  if (u) {
    await loadConfig();
    renderApp();
    onSnapshot(collection(db, "items"), (snapshot) => {
      items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
    });

  } else {
    renderLogin();
  }
});

</script>
</body>
</html>
